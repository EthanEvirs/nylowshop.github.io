<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nylow Shop | Under Construction</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            /* Hint to the user that they can click anywhere */
            cursor: pointer; 
        }
        .container {
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            /* Prevent text selection so clicking feels natural */
            user-select: none; 
        }
        h1 { color: #24292e; }
        p { font-size: 1.2rem; }
        a { color: #0366d6; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Alien.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Nylow Shop</h1>
    </div>

    <script>
        // This function starts the music on the very first click anywhere on the page
        document.body.addEventListener('click', function() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(error => {
                console.log("Autoplay was prevented. Click again!");
            });
        }, { once: true }); // '{ once: true }' ensures this only runs one time
    </script>

</body>
</html>
