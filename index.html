<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nylow Shop | Under Construction</title>
    <style>
        /* 1. Define your new yukari font */
        @font-face {
            font-family: 'YukariFont';
            /* This MUST match your filename exactly */
            src: url('yukari.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            /* Applying the custom font as the primary choice */
            font-family: 'YukariFont', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            cursor: pointer; 
        }

        .container {
            padding: 2.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            user-select: none; 
        }

        h1 { 
            font-family: 'YukariFont';
            color: #24292e; 
            font-size: 4rem; /* Increased size to showcase the new font */
            margin: 0;
            letter-spacing: -1px;
        }

        p { 
            font-family: 'YukariFont';
            font-size: 1.5rem; 
            margin-top: 10px;
            color: #666;
        }

    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Shop.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Nylow Shop</h1>
        <p>Under Construction</p>
    </div>

    <script>
        // Music plays on first click
        document.body.addEventListener('click', function() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(error => {
                console.log("Audio play failed. Ensure Shop.mp3 is in the folder.");
            });
        }, { once: true });
    </script>

</body>
</html>
