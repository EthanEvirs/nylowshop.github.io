<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nylow Shop | Under Construction</title>
    <style>
        /* 1. Define the custom font */
        @font-face {
            font-family: 'FukuCatch';
            /* Make sure this filename matches your actual file exactly */
            src: url('FukuCatch-Detetiive.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            /* 2. Apply the font here for the whole page */
            font-family: 'FukuCatch', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            cursor: pointer; 
        }

        .container {
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none; 
        }

        h1 { 
            /* 3. Specifically use it for the header with a larger size */
            font-family: 'FukuCatch';
            color: #24292e; 
            font-size: 3rem;
            margin: 0;
        }

        p { font-size: 1.2rem; }
        a { color: #0366d6; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Alien.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Nylow Shop</h1>
        <p>Under Construction</p>
    </div>

    <script>
        document.body.addEventListener('click', function() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(error => {
                console.log("Autoplay was prevented.");
            });
        }, { once: true });
    </script>

</body>
</html>
